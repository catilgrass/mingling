<!doctype html>
<html lang="zh-Hans">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover"
        />

        <title>Mingling 中文文档</title>
        <meta
            name="Mingling Documents"
            content="Quick start with Mingling and build your command-line program!"
        />

        <link rel="stylesheet" href="../css/light.css" />
        <link
            id="dark-style"
            rel="stylesheet"
            href="../css/dark.css"
            disabled
        />
    </head>

    <body>
        <nav>
            <a href="https://crates.io/crates/mingling">发布页</a>
            <a href="https://docs.rs/mingling/latest/mingling/">API文档</a>
            <a href="https://git.catilgrass.cn/catilgrass/mingling.git"
                ><b>源代码</b></a
            >
            <a
                href="#"
                onclick="
                    toggleTheme();
                    return false;
                "
                >🌗 主题</a
            >
            <a href="../"><b>英文文档</b></a>
        </nav>
        <div id="app"></div>

        <script>
            window.$docsify = {
                name: "Mingling 中文文档",
                repo: "true",
                corner: {
                    url: "https://github.com/catilgrass/mingling",
                    icon: "github",
                },
                auto2top: true,
                loadSidebar: true,
                maxLevel: 0,
                subMaxLevel: 3,
                search: {
                    placeholder: "Search",
                    noData: "No matches found.",
                    depth: 2,
                },
                plugins: [
                    [
                        "flexible-alerts",
                        {
                            style: "flat",
                            labels: {
                                NOTE: "笔记",
                                TIP: "小贴士",
                                IMPORTANT: "重点",
                                WARNING: "注意",
                                CAUTION: "警告",
                            },
                        },
                    ],
                ],
            };
        </script>

        <script src="../scripts/docsify.min.js"></script>

        <script src="../scripts/zoom-image.min.js"></script>
        <script src="../scripts/search.js"></script>
        <script src="../scripts/prism-bash.min.js"></script>
        <script src="../scripts/prism-toml.min.js"></script>
        <script src="../scripts/prism-rust.js"></script>
        <script src="../scripts/docsify-corner.js"></script>
        <script src="../scripts/docsify-plugin-flexible-alerts.js"></script>

        <script src="../scripts/day-night-switch.js"></script>
    </body>
</html>
